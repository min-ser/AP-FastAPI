{% extends '/azure/base.html' %}

{% block title %}Index Page{% endblock %}

{% block content %}

<section class="content">
    <div class="row">
        <div class="col-md-6">
            <div class="box box-primary">
                <div class="box-header with-border">
                    <h3 class="box-title"><i class="fa fa-key"></i> 1. Access Key 인증</h3>
                </div>
                <form role="form" id="accessKeyForm">
                    <div class="box-body">
                        <div class="form-group">
                            <label>Connection String</label>
                            <input type="text" class="form-control" id="connectionString" placeholder="DefaultEndpointsProtocol=https;AccountName=...">
                        </div>
                    </div>
                    <div class="box-footer">
                        <button type="submit" class="btn btn-primary btn-block">인증 테스트</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-6">
            <div class="box box-info">
                <div class="box-header with-border">
                    <h3 class="box-title"><i class="fa fa-vcard"></i> 2. Workload Identity 인증</h3>
                </div>
                <form role="form" id="workload-IdentityForm">
                    <div class="box-body">
                        <div class="form-group">
                            <label>Account URL</label>
                            <input type="text" class="form-control" id="account_url" placeholder="https://<account>.blob.core.windows.net">
                        </div>
                    </div>
                    <div class="box-footer">
                        <button type="submit" class="btn btn-info btn-block">인증 테스트</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="row" style="margin-top: 20px;">
        <div class="col-md-6">
            <div class="box box-success">
                <div class="box-header with-border">
                    <h3 class="box-title"><i class="fa fa-image"></i> 이미지 가져오기</h3>
                </div>
                <form role="form" id="get-image-form">
                    <div class="box-body">
                        <div class="form-group">
                            <label>Account URL</label>
                            <input type="text" class="form-control" id="account_url_image" placeholder="Account URL">
                            <label style="margin-top:10px;">Container Name</label>
                            <input type="text" class="form-control" id="container_name_image" placeholder="Container Name">
                            <label style="margin-top:10px;">Blob 파일경로/이름</label>
                            <input type="text" class="form-control" id="blob_dir_image" placeholder="folder/image.png">
                        </div>
                    </div>
                    <div class="box-footer">
                        <button type="submit" class="btn btn-success btn-block">이미지 로드</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-6">
            <div class="box box-warning">
                <div class="box-header with-border">
                    <h3 class="box-title"><i class="fa fa-magic"></i> Get Image with GPT 분석</h3>
                </div>
                <form role="form" id="get-image-gpt-form">
                    <div class="box-body">
                        <div class="form-group">
                            <label>Account URL</label>
                            <input type="text" class="form-control" id="account_url_gpt" placeholder="Account URL">
                            <label style="margin-top:10px;">Container Name</label>
                            <input type="text" class="form-control" id="container_name_gpt" placeholder="Container Name">
                            <label style="margin-top:10px;">Blob 파일경로/이름</label>
                            <input type="text" class="form-control" id="blob_dir_gpt" placeholder="folder/image.png">
                        </div>
                    </div>
                    <div class="box-footer">
                        <button type="submit" class="btn btn-warning btn-block">GPT 분석 요청</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="row" style="margin-top: 20px;">
        <div class="col-md-12">
            <div class="box box-solid" id="resultBox" style="display: none; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <div class="box-header with-border" style="background-color: #f9f9f9;">
                    <h3 class="box-title"><i class="fa fa-terminal"></i> 실행 로그 및 분석 결과</h3>
                    <div class="box-tools pull-right" id="statusBadge">
                        </div>
                </div>
                <div class="box-body" style="background-color: #ffffff; padding: 20px;">
                    <div id="summaryInfo" style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee; display: none;">
                        <small class="text-muted"><i class="fa fa-calendar"></i> 실행 시간: <span id="execTime">-</span></small>
                    </div>

                    <div id="imageContainer" class="text-center" style="margin-bottom: 20px;"></div>
                    
                    <div style="background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto;">
                        <pre id="resultMessage" style="border: none; background: transparent; color: inherit; white-space: pre-wrap; font-family: 'Consolas', 'Monaco', monospace; margin: 0;"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="{{ url_for('static', path='app/azure/AzureStorageAccount/main.js') }}"></script>
{% endblock %}
